<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Page Switching</title>

<style>
    body{
        margin:0;
        height:100vh;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ffffff, #f2f2f2);
        overflow:hidden;
    }

    /* Backdrop glass overlay */
    .backdrop{
        position:fixed;
        inset:0;
        background:rgba(255,255,255,0.35);
        backdrop-filter: blur(6px);
        display:flex;
        align-items:center;
        justify-content:center;
        animation: fadeIn 0.2s ease-out forwards;
    }

    @keyframes fadeIn{
        from{opacity:0}
        to{opacity:1}
    }

    /* Glass panel */
    .loader-box{
        width:240px;
        padding:18px 16px;
        border-radius:14px;
        background:rgba(255,255,255,0.6);
        backdrop-filter: blur(12px);
        box-shadow: 0 8px 24px rgba(0,0,0,0.06);
        text-align:center;
        animation: popIn 0.25s ease-out;
    }

    @keyframes popIn{
        from{transform:scale(0.96); opacity:0}
        to{transform:scale(1); opacity:1}
    }

    .text{
        font-size:13px;
        font-weight:500;
        color:#333;
        margin-top:10px;
        letter-spacing:0.2px;
    }

    /* Progress bar */
    .bar{
        width:100%;
        height:3px;
        background:#e9e9e9;
        border-radius:10px;
        overflow:hidden;
        margin-top:12px;
        position:relative;
    }

    .bar::after{
        content:"";
        position:absolute;
        height:100%;
        width:40%;
        background:#999;
        border-radius:10px;
        animation: load 0.9s infinite ease-in-out;
    }

    @keyframes load{
        0%{left:-40%}
        100%{left:100%}
    }

    /* Dot animation */
    .dots{
        display:flex;
        justify-content:center;
        gap:4px;
        margin-top:10px;
    }

    .dots span{
        width:5px;
        height:5px;
        background:#777;
        border-radius:50%;
        animation: pulse 0.8s infinite ease-in-out;
    }

    .dots span:nth-child(2){animation-delay:0.15s}
    .dots span:nth-child(3){animation-delay:0.3s}

    @keyframes pulse{
        0%,100%{transform:scale(0.6); opacity:0.4}
        50%{transform:scale(1); opacity:1}
    }

    /* Final state */
    .ready{
        opacity:0;
        transform:translateY(-6px) scale(0.98);
        transition:all 0.35s ease;
    }
</style>
</head>

<body>

<div class="backdrop" id="screen">
    <div class="loader-box" id="box">
        <div class="text" id="status">Switching page…</div>

        <div class="bar"></div>

        <div class="dots">
            <span></span><span></span><span></span>
        </div>
    </div>
</div>

<script>
    const targetURL = "https://macquery-online-1.jimdosite.com/english/";

    const messages = [
        "Switching page…",
        "Loading content…",
        "Updating view…",
        "Fetching resources…",
        "Ready"
    ];

    const status = document.getElementById("status");
    const box = document.getElementById("box");
    const screen = document.getElementById("screen");

    let i = 0;

    const interval = setInterval(() => {
        i++;
        if(i < messages.length){
            status.textContent = messages[i];
        }

        if(messages[i] === "Ready"){
            clearInterval(interval);

            box.classList.add("ready");

            setTimeout(() => {
                screen.style.opacity = "0";
                screen.style.transition = "opacity 0.3s ease";
            }, 250);

            setTimeout(() => {
                window.location.href = targetURL;
            }, 450);
        }
    }, 450);
</script>

</body>
</html>
